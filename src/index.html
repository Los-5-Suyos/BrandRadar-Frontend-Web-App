<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>BrandRadar</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-container-lowest": "#0d0d16",
            "surface-container-low": "#1b1b23",
            "surface-container": "#1f1f27",
            "surface-container-high": "#292932",
            "surface-container-highest": "#34343d",
            "surface": "#13131b",
            "background": "#13131b",
            "on-surface": "#e4e1ed",
            "on-surface-variant": "#c6c5d7",
            "primary": "#c0c1ff",
            "primary-container": "#5b5fee",
            "on-primary-container": "#f9f6ff",
            "tertiary-container": "#9a3bf6",
            "outline": "#908fa0",
            "outline-variant": "#464555",
            "error-container": "#93000a",
            "on-error-container": "#ffdad6",
          },
          spacing: {
            "xl": "80px",
            "lg": "48px",
            "md": "24px",
            "sm": "12px",
            "xs": "4px",
            "base": "8px",
            "gutter": "24px",
          },
          fontFamily: {
            "body-md": ["DM Sans"],
            "headline-md": ["Syne"],
            "headline-sm": ["Syne"],
            "body-sm": ["DM Sans"],
            "label-md": ["DM Sans"],
          },
          fontSize: {
            "headline-md": ["24px", { lineHeight: "1.3", fontWeight: "600" }],
            "headline-sm": ["20px", { lineHeight: "1.4", fontWeight: "600" }],
            "body-md": ["16px", { lineHeight: "1.6", fontWeight: "400" }],
            "body-sm": ["14px", { lineHeight: "1.5", fontWeight: "400" }],
            "label-md": ["12px", { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "700" }],
          }
        }
      }
    }
  </script>
</head>
<body>
<app-root></app-root>
</body>
</html>
