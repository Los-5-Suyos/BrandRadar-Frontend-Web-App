<div class="page-wrapper">
  <div class="glow-top"></div>
  <div class="glow-bottom"></div>

    <div class="logo-wrapper">
      <img src="./assets/images/light-logo.png" alt="BrandRadar" class="logo">
    </div>

    <div class="glass-card">
      <div class="icon-wrapper">
        <span class="material-symbols-outlined icon">history</span>
      </div>

      @if (!sent) {
        <h2 class="title">¿Olvidaste tu contraseña?</h2>
        <p class="subtitle">
          No te preocupes, introduce tu email corporativo y te enviaremos las instrucciones para restablecerla.
        </p>

        <div class="form-group">
          <label class="label">Email corporativo</label>
          <div class="input-wrapper">
            <span class="material-symbols-outlined input-icon">mail</span>
            <input [(ngModel)]="email" name="email" type="email"
                   placeholder="ejemplo@empresa.com"
                   class="input input-glow">
          </div>
        </div>

        <button (click)="send()" class="btn-primary">
          ENVIAR INSTRUCCIONES
          <span class="material-symbols-outlined btn-icon">send</span>
        </button>
      } @else {
        <h2 class="title">¡Revisa tu correo!</h2>
        <p class="subtitle">
          Hemos enviado las instrucciones a <strong class="highlight">{{ email }}</strong>.
        </p>
      }

      <button (click)="router.navigate(['/login'])" class="btn-back">
        <span class="material-symbols-outlined btn-icon">arrow_back</span>
        Volver al inicio de sesión
      </button>
    </div>
  </div>
