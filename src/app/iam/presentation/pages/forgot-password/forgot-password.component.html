<div class="dark min-h-screen bg-[#0A0B0F] flex flex-col items-center justify-center relative overflow-hidden">
  <div class="fixed top-[-20%] left-[-10%] w-[50%] h-[50%] bg-primary-container rounded-full blur-[150px] opacity-10 pointer-events-none"></div>
  <div class="fixed bottom-[-20%] right-[-10%] w-[50%] h-[50%] bg-tertiary-container rounded-full blur-[150px] opacity-10 pointer-events-none"></div>

  <div class="mb-md z-10">
    <img src="./assets/images/light-logo.png" alt="BrandRadar" class="h-10 w-auto">
  </div>

  <div class="glass-card rounded-2xl p-lg w-full max-w-md z-10 text-center">
    <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-primary-container/20 border border-primary/30 text-primary mb-md mx-auto">
      <span class="material-symbols-outlined text-3xl">history</span>
    </div>

    @if (!sent) {
      <h2 style="font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; color: #e4e1ed;" class="mb-xs">¿Olvidaste tu contraseña?</h2>
      <p style="font-family: 'DM Sans', sans-serif; font-size: 14px; color: #c6c5d7;" class="mb-lg">
        No te preocupes, introduce tu email corporativo y te enviaremos las instrucciones para restablecerla.
      </p>

      <div class="text-left mb-md">
        <label class="block font-label-md text-on-surface-variant mb-base uppercase tracking-[0.1em] text-xs font-bold">Email corporativo</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-sm">
            <span class="material-symbols-outlined text-outline text-[20px]">mail</span>
          </span>
          <input [(ngModel)]="email" name="email" type="email"
                 placeholder="ejemplo@empresa.com"
                 class="w-full bg-surface-container-high border border-outline-variant/30 rounded-lg py-sm pl-[44px] pr-sm text-on-surface input-glow transition-all placeholder:text-on-surface-variant/40">
        </div>
      </div>

      <button (click)="send()" class="btn-gradient w-full py-3 rounded-full text-white flex items-center justify-center gap-2"
              style="font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.1em;">
        ENVIAR INSTRUCCIONES
        <span class="material-symbols-outlined" style="font-size: 18px;">send</span>
      </button>
    } @else {
      <h2 style="font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; color: #e4e1ed;" class="mb-xs">¡Revisa tu correo!</h2>
      <p style="font-family: 'DM Sans', sans-serif; font-size: 14px; color: #c6c5d7;" class="mb-lg">
        Hemos enviado las instrucciones a <strong class="text-primary">{{ email }}</strong>.
      </p>
    }

    <button (click)="router.navigate(['/login'])"
            style="font-family: 'DM Sans', sans-serif; font-size: 14px; color: #c6c5d7;"
            class="flex items-center justify-center gap-2 hover:text-primary transition-colors mt-md w-full">
      <span class="material-symbols-outlined" style="font-size: 18px;">arrow_back</span>
      Volver al inicio de sesión
    </button>
  </div>
</div>
