<header class="simple-header">
  <a routerLink="/" class="header__back-btn" aria-label="Volver al inicio">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
    </svg>
  </a>
  <div class="lang-toggle">
    <span class="lang-toggle__opt active">ES</span>
    <span class="lang-toggle__opt">EN</span>
  </div>
</header>

<main class="auth-container">
  <div class="auth-card-wrapper">
    <div class="auth-mobile-logo">
      <img src="assets/images/light-logo.png" alt="BrandRadar" />
    </div>

    <div class="auth-card">
      <!-- Panel izquierdo hero -->
      <div class="auth-hero-panel">
        <div class="auth-hero__logo">
          <img src="assets/images/light-logo.png" alt="BrandRadar" />
        </div>
        <div class="auth-hero__content">
          <h1 class="auth-title">Hola, ¡Bienvenido!</h1>
          <p class="auth-hero__desc">Inicia sesión para gestionar tu monitoreo en tiempo real.</p>
        </div>
        <div></div>
      </div>

      <!-- Panel derecho formulario -->
      <div class="auth-form-panel">
        <div class="auth-header">
          <h2 class="auth-title" style="margin-bottom:0">Login</h2>
        </div>

        <!-- Banner de bloqueo (DDD: el componente reacciona al estado del servicio) -->
        <app-account-blocked-banner *ngIf="isBlocked" />

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form" novalidate *ngIf="!isBlocked">

          <!-- Email -->
          <div class="form-group">
            <label class="form-label" for="email">Correo electrónico</label>
            <input
              type="email" id="email" formControlName="email"
              class="form-input" placeholder="hola@tudominio.com"
              autocomplete="username" />
            <app-inline-field-error [message]="emailError" />
            <app-inline-field-error *ngIf="loginError && !emailError" [message]="loginError" />
          </div>

          <!-- Contraseña -->
          <div class="form-group">
            <label class="form-label" for="password">Contraseña</label>
            <input
              type="password" id="password" formControlName="password"
              class="form-input" placeholder="••••••••"
              autocomplete="current-password" />
            <app-inline-field-error [message]="passError" />
          </div>

          <!-- Intentos restantes -->
          <div class="attempts-warning" *ngIf="failedAttempts > 0 && !isBlocked">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
            Te quedan <strong>{{ remainingAttempts }}</strong> intento(s).
          </div>

          <!-- Forgot password -->
          <div class="auth-actions">
            <a routerLink="/auth/forgot-password">¿Olvidaste tu contraseña?</a>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn--submit" [disabled]="form.invalid || isLoading">
            <app-loading-spinner *ngIf="isLoading" [size]="18" />
            <span>{{ isLoading ? 'Iniciando sesión…' : 'Iniciar sesión' }}</span>
          </button>
        </form>

        <!-- Acción disponible incluso si bloqueado -->
        <div class="auth-actions blocked-action" *ngIf="isBlocked" style="justify-content:center;margin-top:16px">
          <a routerLink="/auth/forgot-password">Recuperar acceso →</a>
        </div>

        <div class="auth-footer">
          ¿No tienes una cuenta? <a routerLink="/auth/register">Regístrate</a>
        </div>
      </div>
    </div>
  </div>
</main>

<footer><p class="footer__copy">© 2026 BrandRadar. Todos los derechos reservados.</p></footer>

<app-snackbar />
