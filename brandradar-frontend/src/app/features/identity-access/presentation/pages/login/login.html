<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <h1>BrandRadar</h1>
      <p>Monitoreo de reputación de marca</p>
    </div>

    <form (ngSubmit)="login()" #loginForm="ngForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="tu@email.com"
          autocomplete="email"
          required />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required />
      </div>

      @if (error) {
        <div class="error-msg">{{ error }}</div>
      }

      <button type="submit" class="btn-primary" [disabled]="isLoading">
        {{ isLoading ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </form>

    <div class="login-footer">
      <p>¿No tienes cuenta? <a routerLink="/auth/register">Regístrate</a></p>
      <p><a routerLink="/auth/forgot-password">¿Olvidaste tu contraseña?</a></p>
    </div>

    <div class="demo-hint">
      <strong>Demo:</strong> luis&#64;upc.edu.pe / password123
    </div>
  </div>
</div>
