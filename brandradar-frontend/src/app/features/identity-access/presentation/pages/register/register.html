<div class="register-layout">
  <div class="left-panel">
    <div class="brand">
      <img src="assets/images/light-logo.png" alt="BrandRadar" class="brand-logo" />
    </div>
    <div class="hero-text">
      <h1>Monitorea tu<br>reputación con <em>IA.</em></h1>
      <p>Únete a las empresas que protegen su imagen de marca en tiempo real.</p>
    </div>
    <div class="stats">
      <div class="stat">
        <span class="stat-value">98%</span>
        <span class="stat-label">Detección en tiempo real</span>
      </div>
      <div class="stat">
        <span class="stat-value">500+</span>
        <span class="stat-label">Empresas activas</span>
      </div>
      <div class="stat">
        <span class="stat-value">24/7</span>
        <span class="stat-label">Monitoreo continuo</span>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="register-card">
      <h2>Crear cuenta</h2>
      <p class="subtitle">Comienza tu prueba gratuita hoy.</p>

      <div class="error-banner" *ngIf="error()">{{ error() }}</div>

      <div class="form-group">
        <label>NOMBRE COMPLETO</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
          <input type="text" placeholder="Tu nombre" [(ngModel)]="name" />
        </div>
      </div>

      <div class="form-group">
        <label>EMAIL CORPORATIVO</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" placeholder="analista&#64;empresa.com" [(ngModel)]="email" />
        </div>
      </div>

      <div class="form-group">
        <label>CONTRASEÑA</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input [type]="showPassword() ? 'text' : 'password'" placeholder="Mínimo 8 caracteres" [(ngModel)]="password" (keyup.enter)="onSubmit()" />
          <button class="toggle-pass" (click)="togglePassword()" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label>TIPO DE CUENTA</label>
        <div class="select-wrapper">
          <select [(ngModel)]="accountType">
            <option value="empresa">Empresa</option>
            <option value="agencia">Agencia</option>
            <option value="individual">Individual</option>
          </select>
          <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>

      <button class="btn-primary" (click)="onSubmit()" [disabled]="loading()">
        <span *ngIf="!loading()">CREAR CUENTA</span>
        <span *ngIf="loading()" class="spinner"></span>
      </button>

      <p class="login-link">
        ¿Ya tienes cuenta? <a routerLink="/auth/login">Iniciar sesión</a>
      </p>
    </div>
  </div>
</div>
