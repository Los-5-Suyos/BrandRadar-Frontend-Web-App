<div class="page-wrapper">
  <div class="topbar">
    <div class="brand">
      <img src="assets/images/light-logo.png" alt="BrandRadar" class="brand-logo" />
    </div>
  </div>

  <div class="content">
    <div class="card" *ngIf="!sent()">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
          <path d="M12 8v4M12 16h.01"/>
          <path d="M9 11l3-3 3 3M12 8v8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <h2>¿Olvidaste tu contraseña?</h2>
      <p class="desc">No te preocupes, introduce tu email corporativo y te enviaremos las instrucciones para restablecerla.</p>

      <div class="error-banner" *ngIf="error()">{{ error() }}</div>

      <div class="form-group">
        <label>EMAIL CORPORATIVO</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" placeholder="ejemplo&#64;empresa.com" [(ngModel)]="email" (keyup.enter)="onSubmit()" />
        </div>
      </div>

      <button class="btn-primary" (click)="onSubmit()" [disabled]="loading()">
        <span *ngIf="!loading()">
          ENVIAR INSTRUCCIONES
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </span>
        <span *ngIf="loading()" class="spinner"></span>
      </button>

      <a routerLink="/auth/login" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        Volver al inicio de sesión
      </a>
    </div>

    <!-- Success state -->
    <div class="card success-card" *ngIf="sent()">
      <div class="icon-wrap success">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>
      <h2>¡Revisa tu bandeja!</h2>
      <p class="desc">Enviamos las instrucciones a <strong>{{ email }}</strong>. Puede tardar unos minutos.</p>
      <a routerLink="/auth/login" class="btn-primary" style="text-decoration:none; display:flex; align-items:center; justify-content:center;">
        VOLVER AL LOGIN
      </a>
    </div>
  </div>

  <footer>© 2026 BrandRadar.</footer>
</div>
