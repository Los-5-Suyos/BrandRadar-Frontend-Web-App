<div class="page-wrapper">
  <header class="topbar">
    <div class="brand">
      <img src="assets/images/light-logo.png" alt="BrandRadar" class="brand-logo" />
    </div>
    <div class="user-info">
      <span class="user-email">{{ user?.email }}</span>
      <button class="btn-logout" (click)="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Salir
      </button>
    </div>
  </header>

  <div class="content">
    <div class="header-section">
      <h1>Selecciona un Workspace</h1>
      <p>Elige el espacio de trabajo al que deseas acceder.</p>
    </div>

    <div class="loading-state" *ngIf="loading()">
      <div class="loader"></div>
      <p>Cargando workspaces...</p>
    </div>

    <div class="workspaces-grid" *ngIf="!loading()">
      <div
        class="ws-card"
        *ngFor="let ws of workspaces()"
        [class.active]="selected() === ws.id"
        (click)="selectWs(ws.id)"
      >
        <div class="ws-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <div class="ws-info">
          <h3>{{ ws.name }}</h3>
          <span class="ws-status" [class.active-status]="ws.status === 'ACTIVA'">
            {{ ws.status }}
          </span>
        </div>
        <div class="check-icon" *ngIf="selected() === ws.id">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
      </div>

      <div class="ws-card new-ws">
        <div class="ws-icon new">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </div>
        <div class="ws-info">
          <h3>Crear nuevo workspace</h3>
          <span class="ws-status">Disponible</span>
        </div>
      </div>
    </div>

    <button
      class="btn-enter"
      [disabled]="!selected() || entering()"
      (click)="enterWorkspace()"
    >
      <span *ngIf="!entering()">
        INGRESAR AL WORKSPACE
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </span>
      <span *ngIf="entering()" class="spinner"></span>
    </button>
  </div>
</div>
