<div class="danger-zone">
  <h3>Zona de Peligro</h3>
  <p>Acciones irreversibles para la marca actual.</p>

  <button

    (click)="handleDeactivate()"
    class="btn-danger">
    Desactivar Marca
  </button>
</div>

<app-confirmation-modal
  *ngIf="showModal"
  [title]="'Confirmar Desactivación'"
  [message]="'¿Estás seguro de desactivar la marca? Esta acción registrará un evento de auditoría obligatorio.'"
  (onClose)="showModal = false"
  (onConfirm)="onConfirmDeactivation()">
</app-confirmation-modal>
