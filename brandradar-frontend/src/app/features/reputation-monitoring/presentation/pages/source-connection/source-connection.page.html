<div class="page-container">
  <header>
    <h1>Conexión de Fuentes</h1>
    <p>Administra las plataformas de monitoreo de reputación.</p>
  </header>

  <div class="source-grid">
    <div *ngFor="let source of sources" class="source-card">
      <div class="card-info">
        <i [class]="source.icon"></i>
        <h3>{{ source.name }}</h3>
      </div>

      <div class="card-status">
        <app-severity-badge [status]="source.status"></app-severity-badge>
      </div>

      <div class="card-actions">
        <button (click)="handleAction(source)"
                [class.btn-danger]="source.status === 'CRÍTICA' || source.status === 'ERROR'"
                [class.btn-primary]="source.status === 'DESCONECTADA'"
                [class.btn-secondary]="source.status === 'CONECTADA'">
          {{ source.status === 'DESCONECTADA' ? 'Conectar' : 'Gestionar' }}
        </button>
      </div>
    </div>
    <app-confirmation-modal
      *ngIf="showModal"
      [title]="selectedSource?.name"
      [message]="'Para conectar esta plataforma, por favor ingrese sus credenciales de acceso.'"
      (onClose)="closeModal()"
      (onConfirm)="confirmConnection($event)">
    </app-confirmation-modal>
  </div>
