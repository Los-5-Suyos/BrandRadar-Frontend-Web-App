@if (password) {
  <div class="strength-meter" [attr.data-level]="result.level">
    <div class="segments">
      @for (active of segments; track $index) {
        <div class="segment" [class.active]="active"></div>
      }
    </div>
    <div class="meta">
      <span class="label">{{ result.label }}</span>
      <span class="score">{{ result.score }}%</span>
    </div>
    @if (result.feedback.length > 0) {
      <div class="feedback">
        <span class="feedback-title">Agregar:</span>
        <span>{{ result.feedback.join(' · ') }}</span>
      </div>
    }
  </div>
}
