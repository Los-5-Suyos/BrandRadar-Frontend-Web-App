<div class="psm" *ngIf="password">
  <div class="psm__bars">
    <div class="psm__bar" [style.background]="barColor(0)"></div>
    <div class="psm__bar" [style.background]="barColor(1)"></div>
    <div class="psm__bar" [style.background]="barColor(2)"></div>
  </div>
  <span class="psm__label" [style.color]="labelColor">{{ label }}</span>
</div>
